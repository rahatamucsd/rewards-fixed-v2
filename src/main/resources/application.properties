server.port=8080
spring.application.name=rewards-api

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:rewardsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Use schema.sql / data.sql for DDL + seed data; disable Hibernate auto-DDL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=always

# Ensure schema.sql runs before data.sql when JPA is on the classpath
spring.jpa.defer-datasource-initialization=true

# Return 404 for unknown routes instead of forwarding to /error
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
